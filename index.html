<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>you JUST got...</title>
    <link rel="icon" type="image/png" href="lol.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }
        .iframe-container {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .overlay-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            font-family: Arial, sans-serif;
            font-size: 16px;
            text-align: center;
            border: 2px solid #ffaa00;
            box-shadow: 0 0 20px rgba(255,170,0,0.5);
            z-index: 1000;
            pointer-events: none;
            user-select: none;
        }
        .overlay-text a {
            color: #ffaa00;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&loop=1&playlist=dQw4w9WgXcQ&playsinline=1&controls=0&enablejsapi=1" allow="autoplay; muted; loop; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
    </div>

    <div class="overlay-text">
        If you see "Pop-ups blocked", click allow for the website to work.<br>
        <small>(i swear there's no adult websites)</small>
    </div>

    <script>
        (function() {
            const SITES = [
                'https://www.chrome.com',
                'https://www.github.com',
                'https://www.microsoft.com',
                'https://www.freegames.com',
                'https://www.pointerpointer.com',
                'https://mee6.gg',
                'https://dyno.gg',
                'https://talkomatic.co',
                'https://discord.com/developers',
                'https://totalenergies.com',
                'https://sfr.com",
                "https://bonzibuddy.org"
            ];

            const SEARCHES = [
                'how to eat burger',
                'free minecraft apk no scam 2026 latest version',
                'robloxe fre haks 2026 noe SCAM',
                'rush E',
                'me when the',
                'GTA 6 and 7 free'
            ];

            const INTERVAL_SECONDS = 5;

            function openUrl(url) {
                const newWindow = window.open(url, '_blank');
                if (!newWindow) {
                    const link = document.createElement('a');
                    link.href = url;
                    link.target = '_blank';
                    link.click();
                }
            }

            function openRandomSiteAndSearch() {
                const siteIndex = Math.floor(Math.random() * SITES.length);
                const site = SITES[siteIndex];
                const searchIndex = Math.floor(Math.random() * SEARCHES.length);
                const query = SEARCHES[searchIndex];
                const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                openUrl(site);
                setTimeout(() => {
                    openUrl(searchUrl);
                }, 100);
            }

            function downloadFile(filename) {
                const a = document.createElement('a');
                a.href = filename;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            function downloadAllFiles() {
                downloadFile('cat.png');
                downloadFile('you-just-got.txt');
                downloadFile('moai.mp3');
            }

            function startLoopingTTS() {
                if ('speechSynthesis' in window) {
                    function speak() {
                        speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance("Hello, I am your computer");
                        utterance.rate = 1;
                        utterance.pitch = 1;
                        utterance.volume = 1;
                        utterance.lang = 'en-US';
                        utterance.onend = () => {
                            setTimeout(speak, 500);
                        };
                        utterance.onerror = () => {
                            setTimeout(speak, 500);
                        };
                        speechSynthesis.speak(utterance);
                    }
                    speak();
                }
            }

            function startCursorToggle() {
                let cursorState = 'default';
                setInterval(() => {
                    cursorState = cursorState === 'default' ? 'progress' : 'default';
                    document.body.style.cursor = cursorState;
                }, 500);
            }

            function requestFakePermissions() {
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(() => {}, () => {});
                }
                if ('Notification' in window) {
                    Notification.requestPermission().then(() => {});
                }
                if ('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices) {
                    navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                        .then(stream => stream.getTracks().forEach(track => track.stop()))
                        .catch(() => {});
                }
                if ('clipboard' in navigator && 'readText' in navigator.clipboard) {
                    navigator.clipboard.readText().catch(() => {});
                }
            }

            window.addEventListener('load', function() {
                window.open('about:blank', '_blank');

                setTimeout(downloadAllFiles, 500);
                startLoopingTTS();
                startCursorToggle();
                
                setTimeout(requestFakePermissions, 1000);
                setTimeout(requestFakePermissions, 4000);
                setTimeout(requestFakePermissions, 8000);
            });

            setTimeout(openRandomSiteAndSearch, 1000);
            setInterval(openRandomSiteAndSearch, INTERVAL_SECONDS * 1000);
        })();
    </script>
</body>
</html>
