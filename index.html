<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>you JUST got...</title>
    <!-- local lol.png as favicon -->
    <link rel="icon" type="image/png" href="lol.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .iframe-container {
            width: 100vw;
            height: 100vh;
            max-width: 100%;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <!-- Rick Astley - Never Gonna Give You Up -->
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&mute=1&loop=1&playlist=dQw4w9WgXcQ&enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <script>
        (function() {
            // ---- CONFIG ----
            const SITES = [
                'https://www.chrome.com',
                'https://www.github.com',
                'https://www.microsoft.com',
                'https://www.freegames.com',
                'https://www.pointerpointer.com',
                'https://mee6.gg',
                'https://dyno.gg',
                'https://talkomatic.co',
                'https://discord.gg/developer-portal'
            ];

            const SEARCHES = [
                'how to eat burger',
                'free minecraft apk no scam 2026 latest version',
                'robloxe fre haks 2026 noe SCAM',
                'rush E',
                'me when the',
                'GTA 6 and 7 free'
            ];

            const INTERVAL_SECONDS = 2;

            // ---- Helper to open a URL in a new tab ----
            function openUrl(url) {
                const newWindow = window.open(url, '_blank');
                if (!newWindow) {
                    const link = document.createElement('a');
                    link.href = url;
                    link.target = '_blank';
                    link.click();
                }
            }

            // ---- Open random website + random search ----
            function openRandomSiteAndSearch() {
                const siteIndex = Math.floor(Math.random() * SITES.length);
                const site = SITES[siteIndex];

                const searchIndex = Math.floor(Math.random() * SEARCHES.length);
                const query = SEARCHES[searchIndex];
                const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(query);

                openUrl(site);
                setTimeout(() => {
                    openUrl(searchUrl);
                }, 100);
            }

            // ---- Download cat.png ----
            function downloadCatPng() {
                const a = document.createElement('a');
                a.href = 'cat.png';
                a.download = 'cat.png';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }

            // ---- TTS: "Hello, I am your computer" ----
            function speakHello() {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance("Hello, I am your computer");
                    utterance.rate = 1;
                    utterance.pitch = 1;
                    utterance.volume = 1;
                    window.speechSynthesis.speak(utterance);
                }
            }

            // ---- Cursor toggle every 0.5s ----
            function startCursorToggle() {
                let cursorState = 'default';
                setInterval(() => {
                    cursorState = cursorState === 'default' ? 'progress' : 'default';
                    document.body.style.cursor = cursorState;
                }, 500);
            }

            // ---- Initial actions ----
            window.addEventListener('load', function() {
                setTimeout(downloadCatPng, 500);
                speakHello();                  // Say hello
                startCursorToggle();            // Begin cursor toggling
            });

            // Start the prank loop
            setTimeout(openRandomSiteAndSearch, 1000);
            setInterval(openRandomSiteAndSearch, INTERVAL_SECONDS * 1000);
        })();
    </script>
</body>
</html>
